<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(~{::title}, ~{::content})}">

<head>
    <title>Mis Comentarios</title>
</head>

<body>
<div th:fragment="content">
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-chat-left-dots"></i> Mis Comentarios</h2>
            <a th:href="@{/perfil}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Volver al Perfil
            </a>
        </div>

        <div th:if="${comentarios.isEmpty()}" class="alert alert-info">
            <i class="bi bi-info-circle"></i> No has hecho comentarios aún.
        </div>
        
        <div class="row" th:unless="${comentarios.isEmpty()}">
            <div class="col-md-6" th:each="comentario : ${comentarios}">
                <div class="card mb-3">
                    <div class="card-body">
                        <h5 class="card-title">
                            <i class="bi bi-box-seam"></i> 
                            <a th:href="@{/comentarios/producto/{id}(id=${comentario.producto.idProducto})}" 
                               th:text="${comentario.producto.nombre}"></a>
                        </h5>
                        
                        <div class="text-warning mb-2">
                            <i class="bi bi-star-fill" th:each="i : ${#numbers.sequence(1, comentario.calificacion)}"></i>
                            <i class="bi bi-star" th:if="${comentario.calificacion < 5}" th:each="i : ${#numbers.sequence(comentario.calificacion + 1, 5)}"></i>
                        </div>
                        
                        <p class="mb-2" th:text="${comentario.contenido}"></p>
                        
                        <small class="text-muted">
                            <i class="bi bi-clock"></i> 
                            <span th:text="${#temporals.format(comentario.fechaCreacion, 'dd/MM/yyyy HH:mm')}"></span>
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
