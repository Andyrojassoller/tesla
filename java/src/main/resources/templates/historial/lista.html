<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(~{::title}, ~{::content})}">

<head>
    <title>Mi Historial de Navegación</title>
</head>

<body>
<div th:fragment="content">
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-clock-history"></i> Mi Historial de Navegación</h2>
            <a th:href="@{/perfil}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Volver al Perfil
            </a>
        </div>

        <div th:if="${historial.isEmpty()}" class="alert alert-info">
            <i class="bi bi-info-circle"></i> No has visitado ningún producto aún.
        </div>
        
        <div class="row" th:unless="${historial.isEmpty()}">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead class="table-light">
                                    <tr>
                                        <th><i class="bi bi-box-seam"></i> Producto</th>
                                        <th><i class="bi bi-tag"></i> Categoría</th>
                                        <th><i class="bi bi-calendar"></i> Fecha y Hora</th>
                                        <th><i class="bi bi-pc-display"></i> Dispositivo</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="item : ${historial}">
                                        <td>
                                            <strong th:text="${item.nombreProducto}">Producto</strong>
                                        </td>
                                        <td>
                                            <span class="badge bg-primary" th:text="${item.categoriaProducto}">Categoría</span>
                                        </td>
                                        <td>
                                            <small>
                                                <i class="bi bi-calendar3"></i> 
                                                <span th:text="${#temporals.format(item.fechaVisita, 'dd/MM/yyyy')}"></span>
                                                <br>
                                                <i class="bi bi-clock"></i> 
                                                <span th:text="${#temporals.format(item.fechaVisita, 'HH:mm:ss')}"></span>
                                            </small>
                                        </td>
                                        <td>
                                            <small class="text-muted">
                                                <i class="bi bi-globe"></i> <span th:text="${item.ipAddress}">IP</span>
                                            </small>
                                        </td>
                                        <td>
                                            <a th:href="@{/comentarios/producto/{id}(id=${item.idProducto})}" 
                                               class="btn btn-sm btn-outline-primary">
                                                <i class="bi bi-eye"></i> Ver Producto
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Estadísticas -->
        <div class="row mt-4" th:unless="${historial.isEmpty()}">
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h3 class="text-primary" th:text="${historial.size()}">0</h3>
                        <p class="mb-0">Total de Visitas</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h3 class="text-success" th:text="${#sets.size(#lists.toSet(historial.![idProducto]))}">0</h3>
                        <p class="mb-0">Productos Únicos</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h3 class="text-info" th:text="${#sets.size(#lists.toSet(historial.![categoriaProducto]))}">0</h3>
                        <p class="mb-0">Categorías Exploradas</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h3 class="text-warning">
                            <i class="bi bi-graph-up"></i>
                        </h3>
                        <p class="mb-0">Actividad Registrada</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
