<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Sistema de Gestión de Pedidos</title>
    
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .profile-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .profile-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .profile-icon {
            font-size: 80px;
            margin-bottom: 15px;
        }
        
        .profile-body {
            padding: 30px;
        }
        
        .info-row {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
        }
        
        .info-value {
            font-size: 18px;
            color: #333;
        }
        
        .btn-action {
            padding: 12px 20px;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s;
        }
        
        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="profile-card">
                    <div class="profile-header">
                        <i class="bi bi-person-circle profile-icon"></i>
                        <h2 class="mb-0">Mi Perfil</h2>
                    </div>
                    
                    <div class="profile-body">
                        <div class="info-row">
                            <div class="info-label">
                                <i class="bi bi-person"></i> Nombre de Usuario
                            </div>
                            <div class="info-value" th:text="${usuario.nombreUsuario}">usuario</div>
                        </div>
                        
                        <div class="info-row">
                            <div class="info-label">
                                <i class="bi bi-shield-check"></i> Rol
                            </div>
                            <div class="info-value">
                                <span class="badge bg-primary" style="font-size: 16px;" th:text="${usuario.rol}">ROL</span>
                            </div>
                        </div>
                        
                        <div class="info-row">
                            <div class="info-label">
                                <i class="bi bi-circle-fill"></i> Estado de la Cuenta
                            </div>
                            <div class="info-value">
                                <span class="badge" style="font-size: 16px;" th:classappend="${usuario.activo} ? 'bg-success' : 'bg-danger'">
                                    <span th:if="${usuario.activo}">✓ Activo</span>
                                    <span th:unless="${usuario.activo}">✗ Inactivo</span>
                                </span>
                            </div>
                        </div>
                        
                        <hr class="my-4">
                        
                        <h5 class="mb-3"><i class="bi bi-gear"></i> Acciones</h5>
                        
                        <div class="d-grid gap-3">
                            <a th:href="@{/preferencias}" class="btn btn-primary btn-action">
                                <i class="bi bi-sliders"></i> Editar Preferencias
                            </a>
                            
                            <a th:href="@{/historial}" class="btn btn-info btn-action">
                                <i class="bi bi-clock-history"></i> Ver Historial de Navegación
                            </a>
                            
                            <a th:href="@{/}" class="btn btn-secondary btn-action">
                                <i class="bi bi-house"></i> Volver al Inicio
                            </a>
                            
                            <form th:action="@{/logout}" method="post" class="m-0">
                                <button type="submit" class="btn btn-danger btn-action w-100">
                                    <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
