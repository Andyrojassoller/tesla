<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Sistema de Gestión de Pedidos</title>
    
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        
        .register-container {
            max-width: 500px;
            width: 100%;
        }
        
        .register-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .register-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .register-header h1 {
            font-size: 24px;
            margin: 0;
            font-weight: 600;
        }
        
        .register-body {
            padding: 30px;
        }
        
        .btn-register {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            color: white;
        }
        
        .btn-register:hover {
            background: linear-gradient(135deg, #5568d3 0%, #63408a 100%);
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <i class="bi bi-person-plus" style="font-size: 48px;"></i>
                <h1>Crear Cuenta Nueva</h1>
            </div>
            
            <div class="register-body">
                <!-- Mensaje de error -->
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-triangle"></i>
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <!-- Mensaje de éxito -->
                <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="bi bi-check-circle"></i>
                    <span th:text="${mensaje}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <form th:action="@{/registro}" method="post" id="registroForm" novalidate>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    
                    <div class="form-floating mb-3">
                        <input type="text" name="nombreUsuario" class="form-control" 
                               id="nombreUsuario" placeholder="Usuario" 
                               th:value="${usuario != null ? usuario.nombreUsuario : ''}">
                        <label for="nombreUsuario"><i class="bi bi-person"></i> Nombre de Usuario</label>
                    </div>
                    
                    <div class="form-floating mb-3">
                        <input type="password" name="contrasena" class="form-control" 
                               id="contrasena" placeholder="Contraseña">
                        <label for="contrasena"><i class="bi bi-lock"></i> Contraseña</label>
                        <small class="text-muted d-block mt-1">Mínimo 6 caracteres</small>
                    </div>
                    
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="confirmarContrasena" 
                               placeholder="Confirmar contraseña">
                        <label for="confirmarContrasena"><i class="bi bi-lock-fill"></i> Confirmar Contraseña</label>
                    </div>
                    
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="terminos">
                        <label class="form-check-label" for="terminos">
                            Acepto los términos y condiciones
                        </label>
                    </div>
                    
                    <button type="submit" class="btn btn-register">
                        <i class="bi bi-check-circle"></i> Crear Cuenta
                    </button>
                    
                    <div class="text-center mt-3">
                        <a th:href="@{/login}" class="text-decoration-none">
                            <i class="bi bi-arrow-left"></i> Volver al inicio de sesión
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
    
    <script>
        // Validación completa del formulario
        document.getElementById('registroForm').addEventListener('submit', function(e) {
            const nombreUsuario = document.getElementById('nombreUsuario').value.trim();
            const contrasena = document.getElementById('contrasena').value;
            const confirmar = document.getElementById('confirmarContrasena').value;
            const terminos = document.getElementById('terminos').checked;
            
            // Validar que todos los campos estén completos
            if (!nombreUsuario) {
                e.preventDefault();
                alert('Por favor, ingresa un nombre de usuario');
                return false;
            }
            
            if (!contrasena) {
                e.preventDefault();
                alert('Por favor, ingresa una contraseña');
                return false;
            }
            
            if (contrasena.length < 6) {
                e.preventDefault();
                alert('La contraseña debe tener al menos 6 caracteres');
                return false;
            }
            
            if (!confirmar) {
                e.preventDefault();
                alert('Por favor, confirma tu contraseña');
                return false;
            }
            
            if (contrasena !== confirmar) {
                e.preventDefault();
                alert('Las contraseñas no coinciden');
                return false;
            }
            
            if (!terminos) {
                e.preventDefault();
                alert('Debes aceptar los términos y condiciones');
                return false;
            }
            
            return true;
        });
    </script>
</body>
</html>
