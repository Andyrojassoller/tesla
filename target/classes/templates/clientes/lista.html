<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::content})}">
<head>
    <title>Lista de Clientes - Sistema de Gestión de Pedidos</title>
</head>
<body>
    <div th:fragment="content">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0"><i class="bi bi-people"></i> Lista de Clientes</h5>
                <a th:href="@{/clientes/nuevo}" class="btn btn-primary">
                    <i class="bi bi-plus-circle"></i> Nuevo Cliente
                </a>
            </div>
            <div class="card-body">
                <!-- Busqueda -->
                <form th:action="@{/clientes/buscar}" method="get" class="mb-3">
                    <div class="input-group">
                        <input type="text" name="nombre" class="form-control" placeholder="Buscar por nombre..." th:value="${busqueda}">
                        <button class="btn btn-outline-secondary" type="submit">
                            <i class="bi bi-search"></i> Buscar
                        </button>
                        <a th:href="@{/clientes}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-clockwise"></i> Todos
                        </a>
                    </div>
                </form>

                <!-- Tabla -->
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Email</th>
                                <th>Teléfono</th>
                                <th>Fecha Registro</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${clientes.empty}">
                                <td colspan="6" class="text-center text-muted">
                                    <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                    No hay clientes registrados
                                </td>
                            </tr>
                            <tr th:each="cliente : ${clientes}">
                                <td th:text="${cliente.idCliente}">1</td>
                                <td>
                                    <strong th:text="${cliente.nombre}">Nombre</strong>
                                </td>
                                <td>
                                    <i class="bi bi-envelope"></i>
                                    <span th:text="${cliente.email}">email@example.com</span>
                                </td>
                                <td>
                                    <i class="bi bi-telephone"></i>
                                    <span th:text="${cliente.telefono ?: 'N/A'}">123456789</span>
                                </td>
                                <td th:text="${#temporals.format(cliente.fechaRegistro, 'dd/MM/yyyy')}">01/01/2024</td>
                                <td>
                                    <div class="btn-group btn-group-sm" role="group">
                                        <a th:href="@{/clientes/editar/{id}(id=${cliente.idCliente})}" 
                                           class="btn btn-outline-primary" title="Editar">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <a th:href="@{/pedidos/cliente/{id}(id=${cliente.idCliente})}" 
                                           class="btn btn-outline-info" title="Ver Pedidos">
                                            <i class="bi bi-cart"></i>
                                        </a>
                                        <a th:href="@{/clientes/eliminar/{id}(id=${cliente.idCliente})}" 
                                           class="btn btn-outline-danger" title="Eliminar"
                                           onclick="return confirm('¿Está seguro de eliminar este cliente?');">
                                            <i class="bi bi-trash"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Estadísticas -->
                <div class="mt-3 text-muted">
                    <i class="bi bi-info-circle"></i>
                    Total de clientes: <strong th:text="${clientes.size()}">0</strong>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
