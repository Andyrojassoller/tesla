<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(~{::title}, ~{::content})}">

<head>
    <title>Comentarios del Producto</title>
</head>

<body>
<div th:fragment="content">
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2><i class="bi bi-chat-left-text"></i> Comentarios: <span th:text="${producto.nombre}"></span></h2>
                <div class="d-flex align-items-center">
                    <div class="text-warning me-2">
                        <i class="bi bi-star-fill" th:each="i : ${#numbers.sequence(1, calificacionPromedio.intValue())}"></i>
                        <i class="bi bi-star" th:if="${calificacionPromedio.intValue() < 5}" th:each="i : ${#numbers.sequence(calificacionPromedio.intValue() + 1, 5)}"></i>
                    </div>
                    <span class="text-muted" th:text="${#numbers.formatDecimal(calificacionPromedio, 1, 1)} + ' / 5.0'"></span>
                    <span class="badge bg-secondary ms-2" th:text="${comentarios.size()} + ' comentarios'"></span>
                </div>
            </div>
            <a th:href="@{/productos}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Volver
            </a>
        </div>

        <div class="row">
            <!-- Formulario para agregar comentario -->
            <div class="col-md-4 mb-4" sec:authorize="hasAnyRole('ADMIN', 'CLIENTE')">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="bi bi-plus-circle"></i> Agregar Comentario</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/comentarios/agregar}" method="post">
                            <input type="hidden" name="idProducto" th:value="${producto.idProducto}">
                            
                            <div class="mb-3">
                                <label class="form-label">Calificación</label>
                                <select name="calificacion" class="form-select" required>
                                    <option value="">Seleccione...</option>
                                    <option value="5">⭐⭐⭐⭐⭐ Excelente</option>
                                    <option value="4">⭐⭐⭐⭐ Muy bueno</option>
                                    <option value="3">⭐⭐⭐ Bueno</option>
                                    <option value="2">⭐⭐ Regular</option>
                                    <option value="1">⭐ Malo</option>
                                </select>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Comentario</label>
                                <textarea name="contenido" class="form-control" rows="5" 
                                          placeholder="Escribe tu opinión sobre este producto..." required></textarea>
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-send"></i> Enviar Comentario
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Lista de comentarios -->
            <div th:class="${#authorization.expression('hasAnyRole(''ADMIN'', ''CLIENTE'')')} ? 'col-md-8' : 'col-md-12'">
                <div th:if="${comentarios.isEmpty()}" class="alert alert-info">
                    <i class="bi bi-info-circle"></i> No hay comentarios aún. ¡Sé el primero en comentar!
                </div>
                
                <div class="card mb-3" th:each="comentario : ${comentarios}">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div>
                                <strong><i class="bi bi-person-circle"></i> <span th:text="${comentario.usuario.nombreUsuario}"></span></strong>
                                <span class="badge bg-primary ms-2" th:text="${comentario.usuario.rol}"></span>
                            </div>
                            <div class="d-flex align-items-center">
                                <div class="text-warning me-2">
                                    <i class="bi bi-star-fill" th:each="i : ${#numbers.sequence(1, comentario.calificacion)}"></i>
                                    <i class="bi bi-star" th:if="${comentario.calificacion < 5}" th:each="i : ${#numbers.sequence(comentario.calificacion + 1, 5)}"></i>
                                </div>
                                <a sec:authorize="hasRole('ADMIN')" 
                                   th:href="@{/comentarios/eliminar/{id}(id=${comentario.idComentario}, idProducto=${producto.idProducto})}"
                                   class="btn btn-sm btn-danger"
                                   onclick="return confirm('¿Eliminar este comentario?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </div>
                        </div>
                        
                        <p class="mb-2" th:text="${comentario.contenido}"></p>
                        
                        <small class="text-muted">
                            <i class="bi bi-clock"></i> 
                            <span th:text="${#temporals.format(comentario.fechaCreacion, 'dd/MM/yyyy HH:mm')}"></span>
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
