<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
    th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:replace="${title}">Sistema de Gestión de Pedidos</title>
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/17645/17645945.png" type="image/x-icon">
    
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-md-block sidebar">
                <div class="position-sticky pt-3">
                    <div class="text-center mb-4">
                        <h5 class="text-white"><i class="bi bi-cart4"></i> Sistema de Pedidos</h5>
                    </div>
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/}">
                                <i class="bi bi-house-door"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/clientes}">
                                <i class="bi bi-people"></i> Clientes
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/productos}">
                                <i class="bi bi-box-seam"></i> Productos
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" th:href="@{/pedidos}">
                                <i class="bi bi-cart-check"></i> Pedidos
                            </a>
                        </li>

                        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
    <a class="nav-link" th:href="@{/empleados}">
        <i class="bi bi-people-fill"></i> Recursos Humanos
    </a>
</li>
                        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                            <a class="nav-link" th:href="@{/comentarios}">
                                <i class="bi bi-chat-square-text"></i> Comentarios
                            </a>
                        </li>
                        <li class="nav-item" sec:authorize="hasAnyRole('ADMIN', 'CLIENTE')">
                            <a class="nav-link" th:href="@{/comentarios/mis-comentarios}">
                                <i class="bi bi-chat-left-dots"></i> Mis Comentarios
                            </a>
                        </li>
                        <li class="nav-item mt-3">
                            <hr class="bg-light">
                        </li>
                        <li class="nav-item" sec:authorize="isAuthenticated()">
                            <a class="nav-link" th:href="@{/perfil}">
                                <i class="bi bi-person-circle"></i> <span sec:authentication="name">Usuario</span>
                            </a>
                        </li>
                        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                            <a class="nav-link" th:href="@{/admin}">
                                <i class="bi bi-gear"></i> Administración
                            </a>
                        </li>

                        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
    <a class="nav-link" th:href="@{/reportes}">
        <i class="bi bi-bar-chart-line"></i> Reportes
    </a>
</li>

                        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
    <a class="nav-link" th:href="@{/finanzas}">
        <i class="bi bi-cash-coin"></i> Finanzas
    </a>
</li>
                        <li class="nav-item" sec:authorize="isAuthenticated()">
                            <form th:action="@{/logout}" method="post" class="d-inline">
                                <button type="submit" class="nav-link btn btn-link text-start w-100" style="text-decoration: none;">
                                    <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
                                </button>
                            </form>
                        </li>
                        <li class="nav-item" sec:authorize="!isAuthenticated()">
                            <a class="nav-link" th:href="@{/login}">
                                <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main content -->
            <main class="col-md-10 ms-sm-auto px-md-4">
                <!-- Navbar -->
                <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom mb-4 mt-3">
                    <div class="container-fluid">
                        <h4 class="mb-0" th:text="${titulo ?: 'Dashboard'}">Dashboard</h4>
                        <div class="d-flex align-items-center">
                            <span class="me-3"><i class="bi bi-clock"></i> <span th:text="${#temporals.format(#temporals.createNow(), 'dd/MM/yyyy HH:mm')}"></span></span>
                            <span sec:authorize="isAuthenticated()" class="me-3">
                                <span class="badge bg-primary">
                                    <i class="bi bi-shield-check"></i> <span sec:authentication="principal.authorities"></span>
                                </span>
                            </span>
                            <button class="btn btn-link"><i class="bi bi-bell"></i></button>
                        </div>
                    </div>
                </nav>

                <!-- Mensajes Flash -->
                <div th:if="${mensaje}" th:class="'alert alert-' + ${tipoMensaje ?: 'info'} + ' alert-dismissible fade show'" role="alert">
                    <span th:text="${mensaje}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Contenido -->
                <div th:replace="${content}">
                    <p>Contenido principal</p>
                </div>
            </main>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
